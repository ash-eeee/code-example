<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>JS</title>
    </head>
    <body>
        <script>
            function clacCircumfrence(radius){
                let circumference = 2 * Math.PI * radius;
                console.log("The cirumference is " + circumference.toFixed(2));
            }
            function calcArea(radius){
                let area = Math.PI * radius * radius;
                console.log("The area is " + area.toFixed(2));
            }

            let testRadius = 5;
            clacCircumfrence(testRadius);
            calcArea(testRadius);
        </script>
    </body>
</html>
